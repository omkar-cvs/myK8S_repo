apiVersion: v1
kind: ReplicationController
metadata:
  name: myjavaapp-rc
spec:
  replicas: 2
  selector:
    app: myjavaapp
    version: 2.6.1
  template:
    metadata:
      name: myjavaapp
      labels:
        app: myjavaapp
        version: 2.6.1
    spec:
      containers:
        - name: myjavaapp-container
          image: omkarsinghaws/myjavak8sapp:1
          ports:
            - containerPort: 8080
